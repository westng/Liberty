name: Build Desktop Bundles

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      create_release:
        description: "是否发布到 GitHub Release"
        required: false
        type: boolean
        default: false
      prerelease:
        description: "是否标记为预发布版本"
        required: false
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      LIBERTY_RUNTIME_BUNDLE_READY: "1"
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            os: macos-latest
            platform_id: darwin-aarch64
            rust_target: aarch64-apple-darwin
            artifact_name: liberty-macos-aarch64
            artifact_path: |
              src-tauri/target/**/release/bundle/dmg/*.dmg
              src-tauri/target/**/release/bundle/macos/*.app.tar.gz
          - name: macOS Intel
            os: macos-15-intel
            platform_id: darwin-x64
            rust_target: x86_64-apple-darwin
            artifact_name: liberty-macos-x64
            artifact_path: |
              src-tauri/target/**/release/bundle/dmg/*.dmg
              src-tauri/target/**/release/bundle/macos/*.app.tar.gz
          - name: Windows x64
            os: windows-2022
            platform_id: windows-x64
            rust_target: x86_64-pc-windows-msvc
            artifact_name: liberty-windows-x64
            artifact_path: |
              src-tauri/target/**/release/bundle/msi/*.msi
              src-tauri/target/**/release/bundle/nsis/*.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable Corepack PNPM
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@10.30.3 --activate
          pnpm --version

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Dependencies
        shell: bash
        run: |
          pnpm install --frozen-lockfile

      - name: Prepare Bundled Runtime
        shell: bash
        run: |
          python scripts/prepare_runtime_bundle.py \
            --platform-id "${{ matrix.platform_id }}" \
            --output-dir "runtime-bundles/${{ matrix.platform_id }}"

      - name: Build Tauri Bundle
        shell: bash
        run: pnpm tauri build --target ${{ matrix.rust_target }}

      - name: Inspect Build Outputs
        if: always()
        shell: bash
        run: |
          find runtime-bundles -maxdepth 3 -type f -print || true
          find src-tauri/target -maxdepth 6 -type d -name bundle -print || true
          find src-tauri/target -maxdepth 8 -type f \( -name "*.app" -o -name "*.dmg" -o -name "*.exe" -o -name "*.msi" -o -name "*.zip" \) -print || true

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && inputs.create_release)
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve Release Settings
        id: release
        shell: bash
        env:
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            version="$(python3 -c "import json; print(json.load(open('src-tauri/tauri.conf.json'))['version'])")"
            tag="v${version}"
          fi

          if [[ -z "${tag}" ]]; then
            echo "::error::无法解析发布版本号。"
            exit 1
          fi

          if [[ "${tag}" != v* ]]; then
            echo "::error::发布标签必须以 v 开头，例如 v1.0.0。"
            exit 1
          fi

          if ! git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            gh api "repos/${GITHUB_REPOSITORY}/git/refs" \
              -f ref="refs/tags/${tag}" \
              -f sha="${GITHUB_SHA}" >/dev/null
          fi

          target_commit="${GITHUB_SHA}"
          if git rev-parse "${tag}^{commit}" >/dev/null 2>&1; then
            target_commit="$(git rev-parse "${tag}^{commit}")"
          fi

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "target_commit=${target_commit}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${INPUT_PRERELEASE:-false}" >> "$GITHUB_OUTPUT"

      - name: Download Build Artifacts
        uses: actions/download-artifact@v6
        with:
          path: release-assets

      - name: Prepare Release Assets
        id: assets
        shell: bash
        run: |
          mkdir -p release-upload

          while IFS= read -r -d '' file; do
            artifact_name="$(basename "$(dirname "${file}")")"
            file_name="$(basename "${file}")"
            cp "${file}" "release-upload/${artifact_name}-${file_name}"
          done < <(
            find release-assets -type f \
              \( -name "*.dmg" -o -name "*.app.tar.gz" -o -name "*.msi" -o -name "*.exe" \) \
              -print0
          )

          asset_count="$(find release-upload -type f | wc -l | tr -d ' ')"
          if [[ "${asset_count}" == "0" ]]; then
            echo "::error::下载的构建产物中未找到可发布文件。"
            exit 1
          fi

          find release-upload -maxdepth 1 -type f -print | sort
          echo "count=${asset_count}" >> "$GITHUB_OUTPUT"

      - name: Generate Release Notes
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          TARGET_COMMIT: ${{ steps.release.outputs.target_commit }}
        run: |
          gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="${RELEASE_TAG}" \
            -f target_commitish="${TARGET_COMMIT}" \
            --jq ".body" > release-notes.md

      - name: Publish Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          PRERELEASE: ${{ steps.release.outputs.prerelease }}
        run: |
          mapfile -t assets < <(find release-upload -maxdepth 1 -type f | sort)

          release_args=(
            --title "Liberty ${RELEASE_TAG}"
            --notes-file release-notes.md
            --verify-tag
          )

          if [[ "${PRERELEASE}" == "true" ]]; then
            release_args+=(--prerelease)
          fi

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            release_id="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" --jq ".id")"
            python3 - <<'PY'
          import json
          import os

          with open("release-notes.md", encoding="utf-8") as release_notes:
              body = release_notes.read()

          payload = {
              "name": f"Liberty {os.environ['RELEASE_TAG']}",
              "body": body,
              "prerelease": os.environ.get("PRERELEASE") == "true",
          }

          with open("release-update.json", "w", encoding="utf-8") as release_update:
              json.dump(payload, release_update)
          PY
            gh api \
              --method PATCH \
              "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
              --input release-update.json >/dev/null
            gh release upload "${RELEASE_TAG}" "${assets[@]}" --clobber
          else
            gh release create "${RELEASE_TAG}" "${assets[@]}" "${release_args[@]}"
          fi
